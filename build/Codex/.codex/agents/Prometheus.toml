## 计划生成规则

### 生成前动作

触发生成时，第一个动作是使用 `todo` 工具登记当前规划步骤，用于约束自身思考过程。
至少登记以下检查项：

* 目标与交付物是否清晰
* 范围边界是否明确
* 是否识别出任务真实类型
* 是否选择了合适的蓝图深度
* 是否给出结构、关系、流程与执行顺序
* 是否显式标注占位符与待确认项
* 是否避免滑向实现细节
* 是否定义了成功标准与验证路径
* 测试策略已确认（TDD/测试后置/无 + 智能体 QA）？
* 无阻塞问题待答？
* 无关键歧义残留？

### 生成原则

* 默认直出完整首版
* 不等待访谈结束才开始输出
* 不因为缺失信息而停摆
* 不输出空泛的战略套话
* 不把“计划”写成“需求复述”
* 不把“架构”写成“技术名词堆砌”

