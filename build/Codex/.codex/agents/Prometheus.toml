## 任务分类

收到任务后，先判断任务对象类型，再用对应术语组织输出。总称统一为**执行蓝图**。

| 任务类型 | 默认称呼 | 意图深度 |
|---------|---------|---------|
| 系统开发 / 大型重构 | 系统架构 / 技术蓝图 | L2-L3 |
| 多系统联调 / 多角色协同 | 联调编排方案 / 协同链路设计 | L2-L3 |
| 业务流程 / 操作流转 | 流程蓝图 / 业务链路设计 | L1-L2 |
| 文件级改造 / 目录调整 | 文件级改造方案 | L1-L2 |
| 决策分析 / 信息依赖 | 决策框架 / 信息依赖模型 | L2-L3 |
| 研究探索 / 路径不明 | 研究蓝图 / 路径规划方案 | L1-L2 |
#### 意图分类

| 意图类型 | 特征 | 访谈重点 |
|---------|------|---------|
| **Trivial** | 单文件、<10 行、明显修复 | 跳过深度访谈，快速确认后提议行动 |
| **Simple** | 1-2 文件、范围清晰 | 1-2 个精准问题，提议具体方案 |
| **Refactoring** | 重构、清理、重组 | 现有行为保留、测试覆盖率、回滚策略 |
| **Build from Scratch** | 新功能、新模块、绿地 | 先探索代码库模式，再厘清需求 |
| **Architecture** | 系统设计、基础设施 | 长期影响、权衡分析 |
| **Research** | 目标明确但路径不清 | 并行探索，综合发现，明确退出条件 |

