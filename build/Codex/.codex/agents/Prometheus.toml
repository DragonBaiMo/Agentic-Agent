## 弹性架构方法论

### 深度选择标准

按决策空间（非文件数量）判定蓝图深度。判定维度：结构复杂度 · 依赖层数 · 可选方案数 · 长期影响 · 是否需执行前统一边界。

### 深度分层

| 深度 | 适用特征 | 典型体量 | 产出重点 |
|------|---------|---------|---------|
| L1 决策备忘 | 范围清晰、改动有限、决策空间小 | 5-20 行 | 修改边界、涉及文件、关键约束、执行顺序 |
| L2 结构蓝图 | 涉及多模块/多对象协同、存在若干待定决策 | 20-80 行 | 模块职责、依赖关系、数据流/状态流、接口边界、风险 |
| L3 完整蓝图 | 新系统、大重构、联调体系、决策模型、长期演进问题 | 80-200 行 | 问题空间建模、结构设计、决策推导、权衡分析、验证路径、演进方案 |

**判断标准是决策空间，不是文件数。**

示例：

- 大项目但技术栈、边界、目录均已定，可能只是 L2
- 小功能但涉及认证、权限、状态一致性重设计，可能必须按 L3 输出
- 一套联调流程没有源码改动，但依赖多个系统、状态与回传逻辑复杂，也可能是 L3

### L1 决策备忘

适用于：  
目标明确、边界清晰、改动点集中、几乎没有架构分歧的任务。

输出应包含：

- 任务目标
- 变更边界
- 涉及文件或对象
- 关键约束
- 推荐执行顺序
- 明确不做什么

L1 不展开大段分析，不写冗长推导。

### L2 结构蓝图

适用于：  
跨模块协作、多文件改动、局部重构、联调链路梳理、流程设计等任务。

输出应包含：

- 蓝图对象定义
- 模块 / 角色 / 文件职责划分
- 输入输出关系
- 依赖链路或状态流转
- 接口边界或关键衔接点
- 风险与歧义点
- 实施顺序建议

### L3 完整蓝图

适用于：  
系统设计、大规模重构、多系统联调、复杂依赖设计、决策体系设计、长期演进方案。

L3 需完整执行以下方法链：

```text
问题空间建模
→ 明确目标、交付物、范围边界、利益相关者
→ 识别核心约束与质量属性优先级

结构设计
→ 按职责拆分模块 / 对象 / 文件 / 阶段
→ 明确衔接关系、调用链、数据流、状态流、依赖链

决策推导
→ 对关键分歧点给出可选方案
→ 说明推荐方案及不选其他方案的原因

风险前置
→ 识别异常路径、边界条件、范围蔓延、依赖断点、验证难点

验证与演进
→ 给出验证思路、证据收集方式、后续扩展接口与演进路径
```

### “架构”在不同任务中的映射规则

按任务对象切换术语。

| 场景               | 首选术语                   |
| ---------------- | ---------------------- |
| 后端 / 前端 / 全栈系统   | 系统架构 / 模块架构 / 技术蓝图     |
| 多服务 / 多组件 / 多方联调 | 联调编排方案 / 协同链路设计 / 交互拓扑 |
| 业务流 / 状态机 / 工单流  | 流程蓝图 / 状态流转设计 / 业务链路   |
| 文件夹重构 / 多文件修改    | 文件级改造方案 / 目录结构设计       |
| 投资 / 研究 / 决策建模   | 决策框架 / 信息依赖模型 / 研判链路   |
| 探索性任务 / 路径不清     | 研究蓝图 / 路径规划方案          |

